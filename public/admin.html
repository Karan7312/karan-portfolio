<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | KARAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #08080c; --bg-secondary: #0f0f15; --bg-card: #14141c;
            --accent-red: #ff3d5a; --accent-cyan: #00d4ff;
            --accent-gradient: linear-gradient(135deg, #ff3d5a 0%, #ff6b35 100%);
            --text-white: #ffffff; --text-gray: #8a8a9a; --text-muted: #4a4a5a;
            --border-color: rgba(255, 61, 90, 0.15); --glass-bg: rgba(15, 15, 21, 0.85);
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-primary); color: var(--text-white); min-height: 100vh; }
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 40px 30px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .admin-header h1 { font-size: 32px; font-weight: 700; }
        .admin-header h1 span { color: var(--accent-red); }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-white); text-decoration: none; font-size: 14px; transition: all 0.3s ease; }
        .back-btn:hover { border-color: var(--accent-red); }
        .logout-btn { padding: 12px 24px; background: var(--accent-red); border: none; border-radius: 8px; color: white; font-size: 14px; cursor: pointer; transition: all 0.3s ease; }
        .logout-btn:hover { opacity: 0.9; }
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .admin-tab { padding: 14px 28px; background: var(--glass-bg); border: 1px solid var(--border-color); color: var(--text-gray); border-radius: 10px; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; transition: all 0.3s ease; }
        .admin-tab.active { background: var(--accent-gradient); border-color: var(--accent-red); color: white; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .form-card { background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 18px; padding: 32px; margin-bottom: 30px; }
        .form-card h3 { font-size: 20px; margin-bottom: 24px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-group { margin-bottom: 18px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px 18px; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-white); font-family: 'Outfit', sans-serif; font-size: 14px; transition: all 0.3s ease; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-red); }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; font-family: 'Outfit', sans-serif; transition: all 0.3s ease; }
        .btn-primary { background: var(--accent-gradient); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255, 61, 90, 0.3); }
        .data-list { display: grid; gap: 14px; }
        .data-item { background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 22px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .data-item-info h4 { font-size: 16px; margin-bottom: 4px; }
        .data-item-info p { font-size: 13px; color: var(--text-gray); }
        .btn-delete { padding: 10px 18px; background: rgba(255, 61, 90, 0.1); border: 1px solid var(--accent-red); color: var(--accent-red); border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.3s ease; }
        .btn-delete:hover { background: var(--accent-red); color: white; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .status-new { background: rgba(0, 212, 255, 0.15); color: var(--accent-cyan); }
        .status-contacted { background: rgba(255, 107, 53, 0.15); color: #ff6b35; }
        .status-completed { background: rgba(46, 213, 115, 0.15); color: #2ed573; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 50px; width: 100%; max-width: 420px; text-align: center; }
        .login-card h2 { font-size: 28px; margin-bottom: 10px; }
        .login-card > p { color: var(--text-gray); margin-bottom: 35px; }
        .login-card .form-group input { text-align: center; }
        .login-card .btn { width: 100%; justify-content: center; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <h2>Admin <span style="color: var(--accent-red);">Login</span></h2>
            <p>Manage your portfolio content</p>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-container hidden">
        <div class="admin-header">
            <h1>Admin <span>Panel</span></h1>
            <div style="display: flex; gap: 15px;">
                <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> View Site</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="videos">Videos</button>
            <button class="admin-tab" data-tab="experiences">Experience</button>
            <button class="admin-tab" data-tab="skills">Skills</button>
            <button class="admin-tab" data-tab="inquiries">Inquiries</button>
        </div>

        <!-- Videos Section -->
        <div id="tab-videos" class="admin-section active">
            <div class="form-card">
                <h3>Add New Video</h3>
                <form id="addVideoForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <input type="text" id="videoTitle" placeholder="Video Title" required>
                        </div>
                        <div class="form-group">
                            <select id="videoCategory" required>
                                <option value="">Select Category</option>
                                <option value="commercial">Commercial</option>
                                <option value="music-video">Music Video</option>
                                <option value="reels">Reels/Shorts</option>
                                <option value="podcast">Podcast</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <input type="text" id="videoUrl" placeholder="YouTube or Vimeo Video URL" required>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <input type="text" id="videoDuration" placeholder="Duration (e.g., 3:45)">
                        </div>
                    </div>
                    <div class="form-group">
                        <textarea id="videoDescription" placeholder="Description (optional)"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Video</button>
                </form>
            </div>
            <div class="data-list" id="videosList"></div>
        </div>

        <!-- Experience Section -->
        <div id="tab-experiences" class="admin-section">
            <div class="form-card">
                <h3>Add Experience</h3>
                <form id="addExperienceForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <input type="text" id="expCompany" placeholder="Company Name" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="expRole" placeholder="Your Role" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <input type="text" id="expDuration" placeholder="Duration (e.g., 2023 - Present)" required>
                    </div>
                    <div class="form-group">
                        <textarea id="expDescription" placeholder="Description"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Experience</button>
                </form>
            </div>
            <div class="data-list" id="experiencesList"></div>
        </div>

        <!-- Skills Section -->
        <div id="tab-skills" class="admin-section">
            <div class="form-card">
                <h3>Add Skill</h3>
                <form id="addSkillForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <input type="text" id="skillName" placeholder="Skill Name" required>
                        </div>
                        <div class="form-group">
                            <select id="skillCategory" required>
                                <option value="">Select Category</option>
                                <option value="video-editing">Video Editing</option>
                                <option value="color-grading">Color Grading</option>
                                <option value="motion-graphics">Motion Graphics</option>
                                <option value="audio">Audio Editing</option>
                                <option value="other">Other Tools</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Proficiency: <span id="skillValue">70</span>%</label>
                        <input type="range" id="skillProficiency" min="10" max="100" value="70" oninput="document.getElementById('skillValue').textContent = this.value" style="padding: 0;">
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Skill</button>
                </form>
            </div>
            <div class="data-list" id="skillsList"></div>
        </div>

        <!-- Inquiries Section -->
        <div id="tab-inquiries" class="admin-section">
            <div class="data-list" id="inquiriesList"></div>
        </div>
    </div>

    <script>
        // Check if logged in
        async function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in');
            if (isLoggedIn === 'true') {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadAdminData();
            }
        }
        checkAuth();

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Simple auth check (in production, use server-side auth)
            if (username === 'admin' && password === 'karan123') {
                localStorage.setItem('admin_logged_in', 'true');
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadAdminData();
            } else {
                alert('Invalid credentials');
            }
        });

        // Logout
        function logout() {
            localStorage.removeItem('admin_logged_in');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('loginForm').reset();
        }

        // Tab switching
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // Load admin data from localStorage
        function loadAdminData() {
            // Get all data from localStorage
            const videos = JSON.parse(localStorage.getItem('portfolio_videos') || '[]');
            const experiences = JSON.parse(localStorage.getItem('portfolio_experiences') || '[]');
            const skills = JSON.parse(localStorage.getItem('portfolio_skills') || '[]');
            const inquiries = JSON.parse(localStorage.getItem('portfolio_inquiries') || '[]');

            // Videos list
            document.getElementById('videosList').innerHTML = videos.length
                ? videos.map(v => `
                    <div class="data-item">
                        <div class="data-item-info">
                            <h4>${v.title}</h4>
                            <p>${v.category} | ${v.duration || 'No duration'}</p>
                        </div>
                        <button class="btn-delete" onclick="deleteVideo(${v.id})">Delete</button>
                    </div>`).join('')
                : '<p style="color: #8a8a9a; text-align: center; padding: 20px;">No videos. Add one above!</p>';

            // Experiences list
            document.getElementById('experiencesList').innerHTML = experiences.length
                ? experiences.map(e => `
                    <div class="data-item">
                        <div class="data-item-info">
                            <h4>${e.role} at ${e.company}</h4>
                            <p>${e.duration}</p>
                        </div>
                        <button class="btn-delete" onclick="deleteExperience(${e.id})">Delete</button>
                    </div>`).join('')
                : '<p style="color: #8a8a9a; text-align: center; padding: 20px;">No experiences. Add one above!</p>';

            // Skills list
            document.getElementById('skillsList').innerHTML = skills.length
                ? skills.map(s => `
                    <div class="data-item">
                        <div class="data-item-info">
                            <h4>${s.name}</h4>
                            <p>${s.category} | ${s.proficiency}%</p>
                        </div>
                        <button class="btn-delete" onclick="deleteSkill(${s.id})">Delete</button>
                    </div>`).join('')
                : '<p style="color: #8a8a9a; text-align: center; padding: 20px;">No skills. Add one above!</p>';

            // Inquiries list
            document.getElementById('inquiriesList').innerHTML = inquiries.length
                ? inquiries.map(i => `
                    <div class="data-item">
                        <div class="data-item-info">
                            <h4>${i.name} (${i.email})</h4>
                            <p>${i.projectType || 'No type'} | ${i.budget || 'No budget'} | <span class="status-badge status-${i.status || 'new'}">${i.status || 'new'}</span></p>
                            <p>${i.message}</p>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn-delete" onclick="updateInquiryStatus(${i.id}, 'contacted')">Contact</button>
                            <button class="btn-delete" onclick="updateInquiryStatus(${i.id}, 'completed')">Done</button>
                            <button class="btn-delete" onclick="deleteInquiry(${i.id})">Delete</button>
                        </div>
                    </div>`).join('')
                : '<p style="color: #8a8a9a; text-align: center; padding: 20px;">No inquiries yet.</p>';
        }

        // Add Video
        document.getElementById('addVideoForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const videos = JSON.parse(localStorage.getItem('portfolio_videos') || '[]');
            const newVideo = {
                id: Date.now(),
                title: document.getElementById('videoTitle').value,
                category: document.getElementById('videoCategory').value,
                videoUrl: document.getElementById('videoUrl').value,
                duration: document.getElementById('videoDuration').value,
                description: document.getElementById('videoDescription').value
            };
            videos.unshift(newVideo);
            localStorage.setItem('portfolio_videos', JSON.stringify(videos));
            e.target.reset();
            loadAdminData();
            alert('Video added!');
        });

        // Add Experience
        document.getElementById('addExperienceForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const experiences = JSON.parse(localStorage.getItem('portfolio_experiences') || '[]');
            const newExp = {
                id: Date.now(),
                company: document.getElementById('expCompany').value,
                role: document.getElementById('expRole').value,
                duration: document.getElementById('expDuration').value,
                description: document.getElementById('expDescription').value
            };
            experiences.unshift(newExp);
            localStorage.setItem('portfolio_experiences', JSON.stringify(experiences));
            e.target.reset();
            loadAdminData();
            alert('Experience added!');
        });

        // Add Skill
        document.getElementById('addSkillForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const skills = JSON.parse(localStorage.getItem('portfolio_skills') || '[]');
            const newSkill = {
                id: Date.now(),
                name: document.getElementById('skillName').value,
                category: document.getElementById('skillCategory').value,
                proficiency: parseInt(document.getElementById('skillProficiency').value)
            };
            skills.push(newSkill);
            localStorage.setItem('portfolio_skills', JSON.stringify(skills));
            e.target.reset();
            document.getElementById('skillValue').textContent = '70';
            loadAdminData();
            alert('Skill added!');
        });

        // Delete functions
        function deleteVideo(id) {
            if (confirm('Delete this video?')) {
                let videos = JSON.parse(localStorage.getItem('portfolio_videos') || '[]');
                videos = videos.filter(v => v.id !== id);
                localStorage.setItem('portfolio_videos', JSON.stringify(videos));
                loadAdminData();
            }
        }

        function deleteExperience(id) {
            if (confirm('Delete this experience?')) {
                let experiences = JSON.parse(localStorage.getItem('portfolio_experiences') || '[]');
                experiences = experiences.filter(e => e.id !== id);
                localStorage.setItem('portfolio_experiences', JSON.stringify(experiences));
                loadAdminData();
            }
        }

        function deleteSkill(id) {
            if (confirm('Delete this skill?')) {
                let skills = JSON.parse(localStorage.getItem('portfolio_skills') || '[]');
                skills = skills.filter(s => s.id !== id);
                localStorage.setItem('portfolio_skills', JSON.stringify(skills));
                loadAdminData();
            }
        }

        function deleteInquiry(id) {
            if (confirm('Delete this inquiry?')) {
                let inquiries = JSON.parse(localStorage.getItem('portfolio_inquiries') || '[]');
                inquiries = inquiries.filter(i => i.id !== id);
                localStorage.setItem('portfolio_inquiries', JSON.stringify(inquiries));
                loadAdminData();
            }
        }

        function updateInquiryStatus(id, status) {
            let inquiries = JSON.parse(localStorage.getItem('portfolio_inquiries') || '[]');
            const inquiry = inquiries.find(i => i.id === id);
            if (inquiry) {
                inquiry.status = status;
                localStorage.setItem('portfolio_inquiries', JSON.stringify(inquiries));
                loadAdminData();
            }
        }
    </script>
</body>
</html>
